<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Instagram Bio Generator</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md"><h1 class="text-2xl font-bold mb-4 text-center">AI Instagram Bio Generator</h1><p class="text-center text-gray-600 mb-6">Craft the perfect bio with AI magic!</p><div class="mb-4"><label for="keywords" class="block text-gray-700 text-sm font-bold mb-2">Keywords (e.g., photographer, travel):</label><input type="text" id="keywords" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="Enter keywords"></div><div class="mb-6"><label for="tone" class="block text-gray-700 text-sm font-bold mb-2">Tone:</label><select id="tone" class="block appearance-none w-full bg-white border border-gray-400 hover:border-gray-500 px-4 py-2 pr-8 rounded shadow leading-tight focus:outline-none focus:shadow-outline"><option value="funny">Funny</option><option value="professional">Professional</option><option value="inspiring">Inspiring</option><option value="creative">Creative</option></select></div><button id="generateBtn" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full">Generate Bio</button><div id="results" class="mt-6 p-4 bg-gray-50 border border-gray-200 rounded hidden"><p class="text-gray-800 font-semibold mb-2">Your Bio Options:</p><div id="bioOutput" class="space-y-3"></div><button id="copyBtn" class="mt-4 bg-green-500 hover:bg-green-700 text-white font-bold py-1 px-3 text-sm rounded focus:outline-none focus:shadow-outline hidden">Copy to Clipboard</button></div></div><script>document.getElementById('generateBtn').addEventListener('click', async () => { const keywords = document.getElementById('keywords').value; const tone = document.getElementById('tone').value; const resultsDiv = document.getElementById('results'); const bioOutputDiv = document.getElementById('bioOutput'); const copyBtn = document.getElementById('copyBtn'); resultsDiv.classList.add('hidden'); copyBtn.classList.add('hidden'); bioOutputDiv.innerHTML = '<p class="text-gray-500">Generating...</p>'; const response = await fetch('/api/generate-bio', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ keywords, tone }) }); const data = await response.json(); if (data.bios && data.bios.length > 0) { bioOutputDiv.innerHTML = data.bios.map(bio => `<p>${bio}</p>`).join(''); copyBtn.dataset.bios = JSON.stringify(data.bios); resultsDiv.classList.remove('hidden'); copyBtn.classList.remove('hidden'); } else { bioOutputDiv.innerHTML = '<p class="text-red-500">Error generating bios. Please try again.</p>'; resultsDiv.classList.remove('hidden'); }}); document.getElementById('copyBtn').addEventListener('click', () => { const bios = JSON.parse(document.getElementById('copyBtn').dataset.bios); if (bios && bios.length > 0) { navigator.clipboard.writeText(bios.join('\n\n')).then(() => alert('Bios copied to clipboard!')); }});</script></body></html>
