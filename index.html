<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><link rel="preconnect" href="https://fonts.bunny.net"><link href="https://fonts.bunny.net/css?family=inter:400,700" rel="stylesheet" /><style>body{font-family:'Inter',sans-serif;margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background-color:#f0f2f5;color:#333}#app{background:#fff;padding:2rem;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,.1);width:90%;max-width:500px;text-align:center}h1{color:#6200ea;margin-bottom:1rem}p{margin-bottom:1.5rem;line-height:1.5}textarea{width:calc(100% - 20px);padding:10px;margin-bottom:1rem;border:1px solid #ddd;border-radius:5px;resize:vertical;min-height:100px;font-size:1rem}button{background-color:#6200ea;color:#fff;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;font-size:1rem;transition:background-color .3s ease}button:hover{background-color:#3700b3}#bioOutput{background-color:#f9f9f9;border:1px dashed #ccc;padding:1rem;margin-top:1.5rem;border-radius:5px;text-align:left;min-height:50px;word-wrap:break-word}a{color:#6200ea;text-decoration:none}a:hover{text-decoration:underline}</style></head><body><div id="app"><h1>InstaBio AI</h1><p>Craft the perfect Instagram bio with AI.<br/>Just tell us about yourself!</p><textarea id="userInput" placeholder="e.g., 'Coffee lover, photographer, travel enthusiast, foodie. Looking for wanderlust and good vibes.'"></textarea><button onclick="generateBio()">Generate Bio</button><div id="bioOutput">Your captivating bio will appear here!</div><p style="margin-top:2rem;">Get unlimited bios for just $<span id="price">4.99 USD</span>!</p></div><script>async function generateBio(){const input=document.getElementById('userInput').value;const outputDiv=document.getElementById('bioOutput');outputDiv.innerText='Generating your bio...';try{const response=await fetch('/api/generate-bio',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:input})});const data=await response.json();if(response.ok){outputDiv.innerText=data.bio;}else{outputDiv.innerText='Error: '+data.error;}}catch(error){outputDiv.innerText='Failed to connect to the server.';}}document.addEventListener('DOMContentLoaded',()=>{document.getElementById('price').innerText='4.99'});</script></body></html>
