<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenius AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 768px; }
    </style>
</head>
<body class="bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 min-h-screen flex items-center justify-center p-4">
    <div class="container bg-white p-8 rounded-lg shadow-xl text-center">
        <h1 class="text-4xl font-extrabold text-gray-800 mb-4">BioGenius AI</h1>
        <p class="text-lg text-gray-600 mb-6">Craft your perfect Instagram bio, instantly.</p>
        <div class="mb-6">
            <input type="text" id="keywords" placeholder="Keywords (e.g., travel, foodie, entrepreneur)" class="w-full p-3 border border-gray-300 rounded-md mb-3 focus:outline-none focus:ring-2 focus:ring-purple-500">
            <select id="tone" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500">
                <option value="professional">Professional</option>
                <option value="funny">Funny</option>
                <option value="aesthetic">Aesthetic</option>
                <option value="inspirational">Inspirational</option>
                <option value="sarcastic">Sarcastic</option>
            </select>
        </div>
        <button id="generateBtn" class="bg-gradient-to-br from-purple-600 to-pink-600 text-white font-bold py-3 px-8 rounded-full text-lg hover:from-purple-700 hover:to-pink-700 focus:outline-none focus:ring-4 focus:ring-purple-300 transition duration-300 ease-in-out">
            Generate Bio
        </button>
        <div id="bioOutput" class="mt-8 p-4 bg-gray-100 rounded-md border border-gray-200 text-gray-700 text-left hidden">
            <h2 class="text-xl font-semibold mb-2">Your AI-Generated Bio:</h2>
            <p id="generatedText" class="whitespace-pre-line"></p>
            <button class="mt-4 bg-purple-500 text-white px-4 py-2 rounded-md hover:bg-purple-600 focus:outline-none focus:ring-2 focus:ring-purple-300" onclick="copyBio()">Copy Bio</button>
        </div>
        <p class="text-sm text-gray-500 mt-6">Powered by AI</p>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const bioOutputDiv = document.getElementById('bioOutput');
            const generatedTextP = document.getElementById('generatedText');

            if (!keywords) {
                alert('Please enter some keywords!');
                return;
            }
            
            generatedTextP.textContent = 'Generating...';
            bioOutputDiv.classList.remove('hidden');

            try {
                // Placeholder for API call
                const response = await new Promise(resolve => setTimeout(() => {
                    resolve({ bio: `✨ ${keywords.split(',')[0].trim()} vibes | ${tone} touch | Bio crafted just for you! ✨` });
                }, 1500));

                generatedTextP.textContent = response.bio;
            } catch (error) {
                generatedTextP.textContent = 'Failed to generate bio. Please try again.';
                console.error('Generation error:', error);
            }
        });

        function copyBio() {
            const bioText = document.getElementById('generatedText').textContent;
            navigator.clipboard.writeText(bioText).then(() => {
                alert('Bio copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy bio: ', err);
            });
        }
    </script>
</body>
</html>
