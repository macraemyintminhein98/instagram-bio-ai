<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><meta name="description" content="Generate stunning Instagram bios instantly with AI."><style>body{font-family:sans-serif;margin:0;padding:20px;background:#f0f2f5;color:#333;display:flex;flex-direction:column;align-items:center;min-height:100vh}h1{color:#1a1a1a;margin-bottom:10px}p{text-align:center;max-width:600px;margin-bottom:20px}textarea,input,button{width:100%;max-width:400px;padding:12px;margin-bottom:15px;border-radius:8px;border:1px solid #ddd;font-size:16px}textarea{height:120px;resize:vertical}button{background-color:#007bff;color:white;border:none;cursor:pointer;font-weight:bold;transition:background-color .3s}button:hover{background-color:#0056b3}#output{background:#fff;border:1px solid #eee;padding:15px;border-radius:8px;width:100%;max-width:400px;min-height:50px;white-space:pre-wrap;word-wrap:break-word;box-shadow:0 2px 5px rgba(0,0,0,.05)}</style></head><body><h1>InstaBio AI</h1><p>Craft the perfect Instagram bio effortlessly. Tell us about yourself, and our AI will do the rest!</p><textarea id="input" placeholder="e.g., foodie, traveler, cat lover, software engineer"></textarea><button onclick="generateBio()">Generate Bio</button><div id="output">Your new bio will appear here!</div><script>async function generateBio(){const input=document.getElementById('input').value;const output=document.getElementById('output');output.textContent='Generating...';try{const response={bio:"🚀 Exploring the world, one bite at a time. 🐾 Cat whisperer & code ninja. Your daily dose of wanderlust & tech!"};output.textContent=response.bio;}catch(error){output.textContent='Error generating bio. Please try again.';console.error('Error:',error)}}</script></body></html>
