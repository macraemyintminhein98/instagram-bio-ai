<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaBio AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 text-white min-h-screen flex items-center justify-center p-4">
    <div class="bg-white bg-opacity-20 backdrop-filter backdrop-blur-lg rounded-xl shadow-2xl p-8 max-w-md w-full text-center">
        <h1 class="text-4xl font-bold mb-4">InstaBio AI</h1>
        <p class="text-lg mb-6">Craft your perfect Instagram bio instantly!</p>
        <form id="bioForm" class="space-y-4">
            <input type="text" id="keywords" placeholder="Keywords (e.g., travel, foodie, entrepreneur)" class="w-full p-3 rounded-md bg-white bg-opacity-30 border border-white border-opacity-50 text-white placeholder-white focus:outline-none focus:ring-2 focus:ring-white" required>
            <select id="tone" class="w-full p-3 rounded-md bg-white bg-opacity-30 border border-white border-opacity-50 text-white focus:outline-none focus:ring-2 focus:ring-white">
                <option value="friendly" class="text-gray-800">Friendly</option>
                <option value="professional" class="text-gray-800">Professional</option>
                <option value="witty" class="text-gray-800">Witty</option>
                <option value="inspirational" class="text-gray-800">Inspirational</option>
            </select>
            <button type="submit" class="w-full py-3 px-6 rounded-md bg-white text-pink-600 font-bold text-lg hover:bg-opacity-90 transition duration-300">Generate Bio</button>
        </form>
        <div id="results" class="mt-8 text-left space-y-4 hidden">
            <h2 class="text-2xl font-bold mb-2">Your New Bios:</h2>
            <div id="bioOutput" class="bg-white bg-opacity-30 p-4 rounded-md text-sm leading-relaxed">Loading...</div>
            <button id="buyButton" class="w-full py-3 px-6 rounded-md bg-green-500 text-white font-bold text-lg hover:bg-green-600 transition duration-300">Get 5 More for $9.99</button>
        </div>
    </div>
    <script>
        document.getElementById('bioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const bioOutput = document.getElementById('bioOutput');
            const resultsDiv = document.getElementById('results');

            resultsDiv.classList.remove('hidden');
            bioOutput.innerHTML = 'Generating amazing bios...';

            // Simulate API call
            setTimeout(() => {
                bioOutput.innerHTML = `🌟 ${keywords.split(',')[0].trim().charAt(0).toUpperCase() + keywords.split(',')[0].trim().slice(1)} enthusiast | My life in ${tone.toLowerCase()} bytes. ✨ | DM for collabs.`;
                // In a real app, this would be an API call to your backend/ML model
            }, 1500);
        });

        document.getElementById('buyButton').addEventListener('click', () => {
            alert('Redirecting to Stripe for secure payment! (This is a demo)');
            // In a real app, integrate Stripe checkout here
        });
    </script>
</body>
</html>
