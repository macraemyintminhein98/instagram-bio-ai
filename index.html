<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><link rel="stylesheet" href="https://unpkg.com/@picocss/pico@1.*/css/pico.min.css"><style>body{padding:20px;max-width:800px;margin:auto;}main{margin-top:20px;}.bio-output{margin-top:20px;border:1px solid var(--pico-form-element-border-color);padding:15px;border-radius:var(--pico-border-radius);}textarea{min-height:100px;}</style></head><body><main class="container"> <hgroup><h1>InstaBio AI</h1><h2>Craft your perfect Instagram bio.</h2></hgroup><form id="bioForm"> <label for="keywords">Keywords (e.g., photographer, travel, foodie)</label> <input type="text" id="keywords" name="keywords" placeholder="adventure, nature, content creator" required> <label for="tone">Tone</label> <select id="tone" name="tone" required> <option value="funny">Funny</option> <option value="professional">Professional</option> <option value="inspiring">Inspiring</option> <option value="witty">Witty</option> <option value="casual">Casual</option> </select> <button type="submit">Generate Bio</button> </form><article id="loading" aria-busy="true" style="display:none;">Generating...</article><div id="results" class="bio-output" style="display:none;"></div><button id="copyBtn" style="display:none; margin-top:10px;">Copy to Clipboard</button><footer><small>Powered by AI</small></footer></main><script>document.getElementById('bioForm').addEventListener('submit', async (e) => { e.preventDefault(); const keywords = document.getElementById('keywords').value; const tone = document.getElementById('tone').value; const resultsDiv = document.getElementById('results'); const loading = document.getElementById('loading'); const copyBtn = document.getElementById('copyBtn'); resultsDiv.style.display = 'none'; copyBtn.style.display = 'none'; loading.style.display = 'block'; try { const response = await fetch('/api/generate-bio', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ keywords, tone }) }); const data = await response.json(); if (response.ok) { resultsDiv.innerHTML = data.bios.map(bio => `<p>${bio}</p>`).join(''); resultsDiv.style.display = 'block'; copyBtn.style.display = 'block'; } else { resultsDiv.innerHTML = `<p>Error: ${data.error || 'Something went wrong!'}</p>`; resultsDiv.style.display = 'block'; } } catch (error) { resultsDiv.innerHTML = `<p>Network Error: ${error.message}</p>`; resultsDiv.style.display = 'block'; } finally { loading.style.display = 'none'; } });document.getElementById('copyBtn').addEventListener('click', () => { const resultsDiv = document.getElementById('results'); const range = document.createRange(); range.selectNode(resultsDiv); window.getSelection().removeAllRanges(); window.getSelection().addRange(range); try { document.execCommand('copy'); alert('Bio copied to clipboard!'); } catch (err) { console.error('Failed to copy text: ', err); alert('Failed to copy bio.'); } window.getSelection().removeAllRanges(); });</script></body></html>
