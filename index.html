<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md mx-auto text-center"><h1 class="text-3xl font-bold mb-4">InstaBio AI</h1><p class="mb-6 text-gray-600">Craft your perfect Instagram bio instantly!</p><input type="text" id="keywords" placeholder="E.g., photographer, travel, foodie" class="border border-gray-300 p-3 rounded-md w-full mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"><button id="generateBtn" class="bg-blue-600 text-white font-bold py-3 px-6 rounded-md hover:bg-blue-700 transition duration-300">Generate Bio</button><div id="output" class="mt-6 p-4 bg-gray-50 border border-gray-200 rounded-md text-left hidden"></div><p class="mt-8 text-sm text-gray-500">Powered by APEX</p></div><script>document.getElementById('generateBtn').addEventListener('click', async () => {const keywords = document.getElementById('keywords').value;const outputDiv = document.getElementById('output');outputDiv.textContent = 'Generating...'; outputDiv.classList.remove('hidden');try {const response = await fetch('/api/generate-bio', {method: 'POST',headers: {'Content-Type': 'application/json'},body: JSON.stringify({ keywords })});const data = await response.json();if (response.ok) {outputDiv.textContent = data.bio;} else {outputDiv.textContent = `Error: ${data.error || 'Something went wrong.'}`;}            } catch (error) {outputDiv.textContent = 'Error connecting to server.';}});</script></body></html>
