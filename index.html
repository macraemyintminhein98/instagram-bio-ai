<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioBoost AI</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #5b5b5b; margin-bottom: 25px; }
        .container { background-color: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        textarea, input[type="text"] { width: calc(100% - 20px); padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        button { background-color: #4CAF50; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.05rem; transition: background-color 0.3s ease; }
        button:hover { background-color: #45a049; }
        #output { background-color: #e9ecef; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: left; min-height: 80px; word-wrap: break-word; }
        #price-info { margin-top: 20px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>
    <h1>BioBoost AI: Instagram Bio Generator</h1>
    <div class="container">
        <p>Craft the perfect Instagram bio effortlessly with AI. Tell us about yourself!</p>
        <textarea id="keywords" placeholder="Keywords (e.g., entrepreneur, travel, fitness)&#10;Profession (e.g., designer, chef)&#10;Desired Tone (e.g., witty, professional, inspiring)" rows="5"></textarea>
        <button onclick="generateBio()">Generate Bio (Demo)</button>
        <div id="output">Your AI-generated bio will appear here.</div>
        <p id="price-info">Like it? Get more bios or remove limits for just $2 per bio pack!</p>
    </div>
    <script>
        async function generateBio() {
            const keywords = document.getElementById('keywords').value;
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = 'Generating...';

            // This is a placeholder for a real API call
            setTimeout(() => {
                if (keywords.includes('entrepreneur')) {
                    outputDiv.innerHTML = "👑 Building empires & breaking limits. Digital creator | Espresso enthusiast | Dream chaser. DM for collabs! ✨";
                } else if (keywords.includes('travel')) {
                    outputDiv.innerHTML = "✈️ Wanderlust soul | Exploring the world one passport stamp at a time. Sharing my journey & tips! 📍";
                } else {
                    outputDiv.innerHTML = "[AI Generated Bio - Demo Placeholder] Your custom bio generation requires a paid API call. This is a demo. Get a bio pack to unlock full features!";
                }
            }, 1500);

                    method: 'POST',

                });
                const data = await response.json();

                    outputDiv.innerHTML = data.bio;
                } else {

                }
            } catch (error) {

            */
        }
    </script>
</body>
</html>
