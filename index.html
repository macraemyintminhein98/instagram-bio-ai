<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenie AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl p-8 max-w-lg w-full text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">BioGenie AI</h1>
        <p class="text-lg text-gray-600 mb-6">Craft your perfect Instagram bio, instantly.</p>
        <form class="space-y-4">
            <input type="text" placeholder="Keywords (e.g., photographer, travel)" class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-500">
            <select class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-500">
                <option value="">Select Tone</option>
                <option value="funny">Funny</option>
                <option value="professional">Professional</option>
                <option value="inspiring">Inspiring</option>
                <option value="creative">Creative</option>
            </select>
            <button type="submit" class="w-full bg-purple-600 text-white p-3 rounded-md hover:bg-purple-700 transition duration-300">Generate Bio</button>
        </form>
        <div class="mt-8 p-4 bg-gray-50 border border-gray-200 rounded-md text-gray-700 text-left min-h-[100px] flex items-center justify-center">
            <p id="generated-bio" class="text-center italic text-gray-500">Your amazing bio will appear here!</p>
        </div>
        <p class="mt-6 text-sm text-gray-500">Powered by AI. Limited free generations, then just $9.99 for unlimited magic.</p>
    </div>
</body>
</html>
