<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Instagram Bio Generator</title><meta name="description" content="Generate creative and engaging Instagram bios using AI."><style>body{font-family:sans-serif;margin:0;padding:20px;background-color:#f4f7f6;color:#333}#app{max-width:600px;margin:20px auto;background:#fff;padding:30px;border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,.05)}h1{color:#2a9d8f;text-align:center;margin-bottom:30px}label{display:block;margin-bottom:8px;font-weight:bold}input,select,textarea{width:calc(100% - 22px);padding:10px;margin-bottom:20px;border:1px solid #ddd;border-radius:4px}button{width:100%;padding:12px;background-color:#e76f51;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:16px;transition:background-color .3s ease}button:hover{background-color:#d45d40}#bio-results{margin-top:30px;border-top:1px solid #eee;padding-top:20px}p{margin-bottom:10px;line-height:1.6}small{display:block;text-align:center;margin-top:40px;color:#888}</style></head><body><div id="app"><h1>AI Instagram Bio Generator</h1><form id="bio-form"><label for="keywords">Keywords (e.g., 'travel', 'foodie'):</label><input type="text" id="keywords" placeholder="adventure, photography" required><label for="tone">Tone:</label><select id="tone"><option value="professional">Professional</option><option value="funny">Funny</option><option value="inspiring">Inspiring</option><option value="casual">Casual</option><option value="witty">Witty</option></select><button type="submit">Generate Bios</button></form><div id="bio-results"></div><small>Powered by AI. Results may vary.</small></div><script>document.getElementById('bio-form').addEventListener('submit', async (e) => {e.preventDefault();const keywords = document.getElementById('keywords').value;const tone = document.getElementById('tone').value;const resultsDiv = document.getElementById('bio-results');resultsDiv.innerHTML = '<p>Generating...</p>';try {const response = await fetch('/api/generate-bio', {method: 'POST',headers: {'Content-Type': 'application/json'},body: JSON.stringify({ keywords, tone })});const data = await response.json();if (data.bios) {resultsDiv.innerHTML = '<h2>Your New Bios:</h2>' + data.bios.map(bio => `<p>${bio}</p>`).join('');} else if (data.error) {resultsDiv.innerHTML = `<p style="color:red;">${data.error}</p>`;}} catch (error) {resultsDiv.innerHTML = '<p style="color:red;">Error generating bio. Please try again.</p>';}});</script></body></html>
