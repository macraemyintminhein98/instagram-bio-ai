<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><style>body{font-family:sans-serif;margin:20px;background-color:#f0f2f5;color:#333}h1{color:#4a90e2;text-align:center}p{text-align:center;margin-bottom:30px}.container{max-width:600px;margin:0 auto;padding:20px;background-color:#fff;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.1)}.form-group{margin-bottom:15px}label{display:block;margin-bottom:5px;font-weight:bold}input[type="text"], select, textarea{width:calc(100% - 20px);padding:10px;border:1px solid #ddd;border-radius:4px}textarea{resize:vertical}.button-group{text-align:center}.btn{background-color:#4a90e2;color:#fff;padding:12px 20px;border:none;border-radius:4px;cursor:pointer;font-size:16px;margin-top:10px}.btn:hover{background-color:#357ac8}.results{margin-top:30px;visibility:hidden}.bio-card{background-color:#e6f3ff;border:1px solid #cceeff;border-radius:5px;padding:15px;margin-bottom:10px}</style></head><body><div class="container"><h1>InstaBio AI</h1><p>Generate creative Instagram bios instantly!</p><div class="form-group"><label for="keywords">Keywords (e.g., travel, foodie):</label><input type="text" id="keywords" placeholder="adventure, photography"></div><div class="form-group"><label for="personality">Personality (e.g., quirky, professional):</label><input type="text" id="personality" placeholder="optimistic, creative"></div><div class="form-group"><label for="tone">Tone:</label><select id="tone"><option value="funny">Funny</option><option value="professional">Professional</option><option value="aesthetic">Aesthetic</option><option value="inspirational">Inspirational</option></select></div><div class="button-group"><button class="btn" onclick="generateBio()">Generate Bio</button></div><div class="results" id="results"><h2>Generated Bios:</h2><div id="bioOutput"></div></div></div><script>function generateBio(){const keywords=document.getElementById('keywords').value;const personality=document.getElementById('personality').value;const tone=document.getElementById('tone').value;const bioOutput=document.getElementById('bioOutput');const resultsDiv=document.getElementById('results');bioOutput.innerHTML='<div class="bio-card">Loading...</div>';resultsDiv.style.visibility='visible';fetch('/api/generate-bio',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords,personality,tone})}).then(response=>response.json()).then(data=>{bioOutput.innerHTML=data.bios.map(bio=>`<div class="bio-card">${bio}</div>`).join('');}).catch(error=>{console.error('Error:',error);bioOutput.innerHTML='<div class="bio-card" style="color:red;">Error generating bio. Please try again.</div>';});}</script></body></html>
