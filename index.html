<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenie - AI Instagram Bio Generator</title>
    <meta name="description" content="Generate creative and engaging Instagram bios instantly with AI.">
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f9f9f9; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { background-color: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        h1 { color: #333; margin-bottom: 20px; }
        textarea, input[type="text"] { width: calc(100% - 20px); padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
        button { background-color: #8C47FF; color: white; padding: 12px 25px; border: none; border-radius: 4px; cursor: pointer; font-size: 18px; transition: background-color 0.3s ease; }
        button:hover { background-color: #723be6; }
        #result { margin-top: 25px; padding: 20px; background-color: #eef; border-radius: 4px; text-align: left; white-space: pre-wrap; word-wrap: break-word; min-height: 50px; border: 1px dashed #ccc; }
        .price { font-size: 24px; font-weight: bold; color: #8C47FF; margin-top: 20px; }
        footer { margin-top: auto; padding-top: 20px; font-size: 0.9em; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BioGenie ✨</h1>
        <p>AI-Powered Instagram Bio Generator</p>
        <textarea id="keywords" rows="4" placeholder="Keywords (e.g., 'photographer', 'travel', 'foodie')"></textarea>
        <input type="text" id="tone" placeholder="Desired Tone (e.g., 'witty', 'professional', 'inspiring')">
        <button onclick="generateBio()">Generate Bio</button>
        <div id="result">Your amazing bio will appear here!</div>
        <p class="price">Only $2.00 per generation</p>
    </div>
    <footer>
        &copy; 2023 BioGenie. All rights reserved.
    </footer>
    <script>
        async function generateBio() {
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const resultDiv = document.getElementById('result');
            if (!keywords) {
                resultDiv.textContent = "Please enter some keywords to generate a bio.";
                return;
            }
            resultDiv.textContent = "Generating...";
            // In a real app, this would call a backend API that handles AI generation and payment
            try {
                // Placeholder for API call
                const response = await fetch('/api/generate-bio', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ keywords, tone })
                });
                const data = await response.json();
                if (response.ok) {
                    resultDiv.textContent = data.bio;
                } else {
                    resultDiv.textContent = data.error || 'Failed to generate bio. Please try again.';
                }
            } catch (error) {
                resultDiv.textContent = 'An error occurred. Please check your connection and try again.';
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
