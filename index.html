<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenie AI - Instagram Bio Generator</title>
    <meta name="description" content="Generate creative, personalized Instagram bios with AI.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <style>
        .gradient-bg { background: linear-gradient(to right, #6EE7B7, #3B82F6); }
        .form-control { @apply w-full p-3 border border-gray-300 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500; }
        .btn-primary { @apply w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 transition duration-300; }
        .bio-output { @apply p-4 bg-gray-100 rounded mt-6 text-gray-800 break-words whitespace-pre-wrap; }
    </style>
</head>
<body class="font-sans antialiased bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full m-4">
        <h1 class="text-4xl font-bold text-center mb-6 text-gray-900">BioGenie AI ✨</h1>
        <p class="text-center text-gray-600 mb-8">Craft your perfect Instagram bio instantly!</p>
        <form id="bioForm" class="space-y-4">
            <input type="text" id="interests" class="form-control" placeholder="Interests (e.g., travel, tech, food)">
            <input type="text" id="profession" class="form-control" placeholder="Profession (e.g., student, entrepreneur)">
            <select id="tone" class="form-control">
                <option value="">Select Tone</option>
                <option value="professional">Professional</option>
                <option value="funny">Funny</option>
                <option value="inspiring">Inspiring</option>
                <option value="casual">Casual</option>
            </select>
            <button type="submit" class="btn-primary">Generate Bio ($4.99)</button>
        </form>
        <div id="bioOutput" class="bio-output hidden">
            <p class="font-semibold mb-2">Your AI-Generated Bio:</p>
            <p id="generatedBio" class="text-lg"></p>
        </div>
        <p class="text-center text-sm text-gray-500 mt-6">Powered by magic & AI. ✨</p>
    </div>
    <script>
      document.getElementById('bioForm').addEventListener('submit', async function(e) {
          e.preventDefault();
          const interests = document.getElementById('interests').value;
          const profession = document.getElementById('profession').value;
          const tone = document.getElementById('tone').value;
          const generatedBioElement = document.getElementById('generatedBio');
          const bioOutputDiv = document.getElementById('bioOutput');
          
          // Simulate API call and payment
          generatedBioElement.textContent = 'Generating your bio...';
          bioOutputDiv.classList.remove('hidden');

          // In a real app, this would be an API call to a backend that handles AI generation and Stripe payment.
          // This is a placeholder for demonstration.
          setTimeout(() => {
              const exampleBios = [
                  `🎉 Exploring the world, one byte at a time. Tech enthusiast & Food lover. Living my best life! #DigitalNomad`, 
                  `📚 Student by day, dreamer by night. Coffee-fueled code & adventure seeker. Always learning!`, 
                  `💼 Entrepreneur | Building dreams & brands. Passionate about innovation & making an impact. Let's connect!`, 
                  `😂 Here for a good time, not a long time. My life is 90% caffeine, 10% chaos. DM for memes!`, 
                  `✨ Spreading good vibes & positivity. Inspiring others to chase their potential. Believe in yourself!`
              ];
              const randomBio = exampleBios[Math.floor(Math.random() * exampleBios.length)];
              generatedBioElement.textContent = randomBio;
          }, 2000);
      });
    </script>
</body>
</html>
