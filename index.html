<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { background-color: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        h1 { color: #8A2BE2; margin-bottom: 20px; }
        p { font-size: 1.1em; line-height: 1.6; margin-bottom: 25px; }
        input[type="text"] { width: calc(100% - 22px); padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em; }
        button { background-color: #8A2BE2; color: #fff; padding: 12px 25px; border: none; border-radius: 5px; font-size: 1.1em; cursor: pointer; transition: background-color 0.3s ease; }
        button:hover { background-color: #6A1BAE; }
        #bios-output { margin-top: 25px; padding: 20px; background-color: #f9f9f9; border-radius: 8px; text-align: left; min-height: 100px; border: 1px dashed #eee; font-style: italic; color: #555; }
        .price { font-size: 1.5em; font-weight: 600; color: #8A2BE2; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BioGenie: AI Instagram Bio Generator</h1>
        <p>Unlock your best Instagram self with AI-powered bios. Just tell us a few keywords, and let BioGenie craft your perfect story.</p>
        <input type="text" id="keywords" placeholder="e.g., photographer, traveler, foodie, dog mom">
        <button onclick="generateBio()">Generate My Bio</button>
        <div id="bios-output">Your amazing bios will appear here.</div>
        <p class="price">Only $9.99 for unlimited bios!</p>
    </div>

    <script>
        function generateBio() {
            const keywords = document.getElementById('keywords').value;
            const outputDiv = document.getElementById('bios-output');
            
            if (!keywords) {
                outputDiv.innerHTML = "Please enter some keywords to get started!";
                return;
            }

            outputDiv.innerHTML = "Generating your masterpiece... Please wait.";
            // In a real app, this would make an API call to a backend function
            // For this static demo, simulate a response
            setTimeout(() => {
                outputDiv.innerHTML = `
                    <p>✨ <b>Option 1:</b> ${keywords.split(',')[0].trim().charAt(0).toUpperCase() + keywords.split(',')[0].trim().slice(1)} | Exploring the world, one snapshot/bite/adventure at a time. Dog mom to a furry co-pilot. Let's connect! 📸✈️🐾</p>
                    <p>✨ <b>Option 2:</b> Life's an adventure, and I'm living it! Passionate ${keywords.split(',')[0].trim()}. Always seeking new experiences and delicious moments. Follow along! 🌍😋</p>
                    <p>✨ <b>Option 3:</b> Creative soul with a love for ${keywords.split(',')[0].trim()}. Capturing beauty, chasing dreams, and sharing my journey. DM for collabs! 💖✨</p>
                `;
            }, 2000); 
        }
    </script>
</body>
</html>
