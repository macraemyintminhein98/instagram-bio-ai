<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><style>body{font-family:sans-serif;margin:0;display:flex;flex-direction:column;align-items:center;padding:20px;background:#f0f2f5;}header{text-align:center;margin-bottom:30px;}h1{color:#333;}main{background:white;padding:30px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);max-width:500px;width:100%;}input,select,button,textarea{width:calc(100% - 20px);padding:10px;margin-bottom:15px;border-radius:5px;border:1px solid #ddd;}button{background:#4CAF50;color:white;cursor:pointer;font-size:16px;}button:hover{background:#45a049;}#bio-output{margin-top:20px;padding:15px;background:#e9ecef;border-radius:5px;min-height:80px;white-space:pre-wrap;}footer{margin-top:40px;font-size:14px;color:#777;}</style></head><body><header><h1>InstaBio AI</h1><p>Craft the perfect Instagram bio with AI. Fast, creative, and engaging!</p></header><main><input type="text" id="keywords" placeholder="Keywords (e.g., photographer, travel, foodie)"><select id="tone"><option value="aesthetic">Aesthetic</option><option value="funny">Funny</option><option value="professional">Professional</option><option value="sarcastic">Sarcastic</option></select><button id="generate-btn">Generate Bio</button><div id="bio-output">Your generated bio will appear here.</div><button id="copy-btn" style="display:none; margin-top: 10px;">Copy Bio</button></main><footer><p>&copy; 2023 InstaBio AI. All rights reserved.</p></footer><script>const generateBtn = document.getElementById('generate-btn');const copyBtn = document.getElementById('copy-btn');const bioOutput = document.getElementById('bio-output');const keywordsInput = document.getElementById('keywords');const toneSelect = document.getElementById('tone');generateBtn.addEventListener('click', async () => {bioOutput.textContent = 'Generating...';copyBtn.style.display = 'none';const keywords = keywordsInput.value;const tone = toneSelect.value;const response = await fetch('/api/generate-bio', {method: 'POST',headers: {'Content-Type': 'application/json'},body: JSON.stringify({ keywords, tone })});const data = await response.json();bioOutput.textContent = data.bio;copyBtn.style.display = 'block';});copyBtn.addEventListener('click', () => {navigator.clipboard.writeText(bioOutput.textContent);alert('Bio copied to clipboard!');});</script></body></html>
