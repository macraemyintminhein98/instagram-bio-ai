<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaBio AI - Generate Your Bio</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background-color: #f7fafc; }
        .container { max-width: 600px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-3xl font-bold text-center mb-6">InstaBio AI</h1>
        <p class="text-center text-gray-600 mb-8">Craft captivating Instagram bios instantly.</p>
        
        <form id="bioForm" class="space-y-4">
            <div>
                <label for="keywords" class="block text-sm font-medium text-gray-700">Keywords (e.g., entrepreneur, traveler, fashion)</label>
                <input type="text" id="keywords" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Separate with commas" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition duration-300">Generate Bio Ideas</button>
        </form>

        <div id="results" class="mt-8 hidden">
            <h2 class="text-xl font-semibold mb-4">Your Generated Bios:</h2>
            <div id="bioList" class="space-y-4"></div>
            <button id="checkoutBtn" class="mt-6 w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-md transition duration-300">Get Unlimited Access - $9.99</button>
        </div>
    </div>

    <script>
        // Placeholder for client-side logic (e.g., API calls, AI response display)
        // In a Next.js app, this would be handled by React components.
        document.getElementById('bioForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const bioList = document.getElementById('bioList');
            bioList.innerHTML = `
                <div class="p-4 border border-gray-200 rounded-md bg-gray-50">✨ CEO & Dream Weaver | Inspiring growth & impact.</div>
                <div class="p-4 border border-gray-200 rounded-md bg-gray-50">✈️ Wanderlust soul | Documenting adventures & hidden gems.</div>
                <div class="p-4 border border-gray-200 rounded-md bg-gray-50">👗 Style curator | Empowering confidence through fashion.</div>
            `;
            document.getElementById('results').classList.remove('hidden');
        });

        document.getElementById('checkoutBtn').addEventListener('click', function() {
            alert('Redirecting to secure checkout for $9.99!');
            // In a real app, this would initiate a Stripe Checkout session.
        });
    </script>
</body>
</html>
