<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Instagram Bio Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
        <h1 class="text-3xl font-bold mb-6 text-center">Craft Your Perfect Instagram Bio</h1>
        <form class="space-y-4">
            <div>
                <label for="tone" class="block text-sm font-medium text-gray-700">Tone:</label>
                <input type="text" id="tone" name="tone" placeholder="e.g., witty, professional, creative" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label for="keywords" class="block text-sm font-medium text-gray-700">Keywords (comma-separated):</label>
                <input type="text" id="keywords" name="keywords" placeholder="e.g., fashion, travel, entrepreneur" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label for="niche" class="block text-sm font-medium text-gray-700">Niche/Industry:</label>
                <input type="text" id="niche" name="niche" placeholder="e.g., blogger, artist, coach" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Generate Bio</button>
        </form>
        <div id="results" class="mt-6 space-y-3 hidden">
            <h2 class="text-xl font-semibold text-gray-800">Your Bios:</h2>
            <div class="p-4 bg-gray-50 border border-gray-200 rounded-md">Bio 1 example...</div>
            <div class="p-4 bg-gray-50 border border-gray-200 rounded-md">Bio 2 example...</div>
        </div>
        <p class="text-center text-sm text-gray-500 mt-6">Powered by AI</p>
    </div>
</body>
</html>
