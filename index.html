<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenie AI: Instagram Bio Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .cta-button { transition: all 0.3s ease; }
        .cta-button:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-100 to-indigo-200 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl p-8 max-w-lg w-full text-center">
        <h1 class="text-4xl font-extrabold text-gray-800 mb-4">BioGenie AI</h1>
        <p class="text-xl text-gray-600 mb-6">Craft the perfect Instagram bio, instantly.</p>
        
        <input type="text" id="keywordsInput" class="w-full p-3 border border-gray-300 rounded-md mb-4 focus:ring-indigo-500 focus:border-indigo-500" placeholder="Enter keywords (e.g., travel, food, artist)">
        
        <button id="generateBio" class="cta-button bg-indigo-600 text-white font-bold py-3 px-6 rounded-md shadow-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-50">
            Generate Bio
        </button>
        
        <div id="bioOutput" class="mt-8 p-6 bg-gray-50 border border-gray-200 rounded-md text-gray-700 text-left min-h-[100px] flex items-center justify-center">
            <p class="text-gray-500">Your new bio will appear here!</p>
        </div>
            
        <button id="buyNow" class="cta-button mt-8 bg-green-500 text-white font-bold py-3 px-6 rounded-md shadow-lg hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-50">
            Buy Now - $4.99
        </button>
        <p class="text-sm text-gray-500 mt-4">Powered by AI to make your profile shine.</p>
    </div>

    <script>
        // Placeholder for AI generation and Stripe integration logic
        document.getElementById('generateBio').addEventListener('click', async () => {
            const keywords = document.getElementById('keywordsInput').value;
            const output = document.getElementById('bioOutput');
            output.innerHTML = `<p class="text-gray-600">Thinking up something amazing for '${keywords}'...</p>`;
            
            // In a real app, this would call your backend API which then calls the AI model
            setTimeout(() => {
                const generatedBios = [
                    `Wanderlust & good vibes ✨ Exploring the world one coffee at a time. #TravelBlogger`, 
                    `Fuelled by coffee & ambitions preneur. Building my dreams, one step at a time.`, 
                    `Living life in full bloom 🌸 Dog mom, book lover, and eternal optimist.`
                ];
                output.innerHTML = `<p>${generatedBios[Math.floor(Math.random() * generatedBios.length)]}</p>`;
            }, 2000);
        });

        document.getElementById('buyNow').addEventListener('click', () => {
            alert('Redirecting to secure checkout for $4.99! (Stripe integration would go here)');
            // Redirect to Stripe checkout page
        });
    </script>
</body>
</html>
