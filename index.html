<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><style>body{font-family:sans-serif;margin:20px;background:#f4f4f4;color:#333}h1{color:#007bff}main{max-width:600px;margin:20px auto;padding:20px;background:#fff;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1)}label{display:block;margin-bottom:8px;font-weight:bold}input[type=text],textarea,select{width:calc(100% - 20px);padding:10px;margin-bottom:15px;border:1px solid #ddd;border-radius:4px}button{background-color:#007bff;color:#fff;padding:10px 15px;border:none;border-radius:4px;cursor:pointer}button:hover{background-color:#0056b3}#output{margin-top:20px;padding:10px;border:1px dashed #007bff;border-radius:4px;background:#e7f5ff;min-height:50px}</style></head><body><main><h1>InstaBio AI Generator</h1><p>Craft the perfect Instagram bio instantly!</p><label for="keywords">Interests/Keywords (comma-separated):</label><input type="text" id="keywords" placeholder="e.g., travel, foodie, entrepreneur"><label for="tone">Tone:</label><select id="tone"><option value="witty">Witty</option><option value="professional">Professional</option><option value="casual">Casual</option><option value="inspirational">Inspirational</option></select><label for="emojis">Include Emojis?</label><input type="checkbox" id="emojis" checked><button onclick="generateBio()">Generate Bio</button><div id="output">Your new bio will appear here...</div><p><small>Powered by advanced AI.</small></p></main><script>async function generateBio(){const keywords = document.getElementById('keywords').value;const tone = document.getElementById('tone').value;const emojis = document.getElementById('emojis').checked;'use your AI API here'}</script></body></html>
